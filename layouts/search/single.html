{{ define "main" }}
<h2 style="font-family: 'Playfair Display', Georgia, serif; font-size: 28px; font-weight: 400; margin-bottom: 2rem;">Search Recipes</h2>

<input type="text" id="search-input" placeholder="Try &ldquo;pomegranate&rdquo; or &ldquo;chicken&rdquo;&hellip;"
  style="width: 100%; padding: 0.75rem 1rem; font-size: 16px; border: 1px solid #E8DDD2; border-radius: 6px; outline: none; font-family: inherit; background: #FDFAF7; margin-bottom: 2rem;">

<div id="search-results"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/7.0.0/fuse.min.js"></script>
<script>
  let fuse;
  fetch('/index.json')
    .then(r => r.json())
    .then(data => {
      fuse = new Fuse(data, {
        keys: ['title', 'description', 'content'],
        threshold: 0.4,
        includeScore: true
      });
      const q = new URLSearchParams(window.location.search).get('q');
      if (q) {
        document.getElementById('search-input').value = q;
        showResults(q);
      }
    });

  document.getElementById('search-input').addEventListener('input', e => {
    const q = e.target.value.trim();
    const url = new URL(window.location);
    if (q) url.searchParams.set('q', q); else url.searchParams.delete('q');
    history.replaceState({}, '', url);
    showResults(q);
  });

  function showResults(q) {
    const el = document.getElementById('search-results');
    if (!q) { el.innerHTML = ''; return; }
    const results = fuse ? fuse.search(q) : [];
    if (!results.length) {
      el.innerHTML = '<p style="color:#999; font-size:15px;">No recipes found for &ldquo;' + q + '&rdquo;.</p>';
      return;
    }
    el.innerHTML = results.map(r => `
      <article class="post-card">
        <h2><a href="${r.item.url}">${r.item.title}</a></h2>
        <p class="meta">${r.item.date}</p>
        <p>${r.item.description}</p>
      </article>`).join('');
  }
</script>
{{ end }}
