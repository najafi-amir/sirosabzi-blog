<div class="recipe" style="background-color: #f9f9f9; padding: 20px; border-left: 4px solid #8B4513; margin: 20px 0; border-radius: 4px;">
  <strong>Recipe Info</strong><br>
  {{ with .Page.Params.recipe }}
  <span>🍽 {{ .yield }}</span> &nbsp;|&nbsp;
  <span>⏱ Prep: {{ .prep_time_minutes }}min</span> &nbsp;|&nbsp;
  <span>🔥 Cook: {{ .cook_time_minutes }}min</span> &nbsp;|&nbsp;
  <span>📊 {{ .difficulty }}</span>
  {{ end }}
</div>
