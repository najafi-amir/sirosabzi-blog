<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
    <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="/index.xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.7;
            color: #1a1a1a;
            background: #fff;
        }

        /* ── Header: Warm & Rustic ── */
        header {
            background: #C9B49A;
            padding: 1.25rem 2rem;
            border-bottom: 1px solid #B8A088;
        }
        .header-inner {
            max-width: 860px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .header-logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
        .header-logo img { height: 80px; width: auto; }
        nav a {
            margin-left: 1.75rem;
            text-decoration: none;
            color: #1a1a1a;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 500;
        }
        nav a:hover { color: #000; }

        /* ── Main: Clean & Modern ── */
        main {
            max-width: 860px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        /* Homepage post cards */
        article.post-card {
            padding: 1.75rem 0;
            border-bottom: 1px solid #F0EDE8;
        }
        article.post-card:last-child { border-bottom: none; }
        article.post-card h2 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 22px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 0.4rem;
            line-height: 1.3;
        }
        article.post-card h2 a { text-decoration: none; color: inherit; }
        article.post-card h2 a:hover { color: #C4622D; }
        article.post-card .meta { font-size: 12px; color: #aaa; margin-bottom: 0.5rem; letter-spacing: 0.03em; }
        article.post-card p { font-size: 15px; color: #666; line-height: 1.65; }

        /* Single post header */
        .post-header { margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid #F0EDE8; }
        .post-header h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 38px;
            font-weight: 600;
            color: #1a1a1a;
            line-height: 1.2;
            margin-bottom: 0.75rem;
        }
        .post-header .meta { font-size: 13px; color: #aaa; letter-spacing: 0.03em; }

        /* Post body */
        .post-content h2 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 26px;
            font-weight: 400;
            color: #1a1a1a;
            margin: 2.5rem 0 1rem;
        }
        .post-content h3 {
            font-size: 11px;
            font-weight: 600;
            color: #888;
            margin: 2rem 0 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .post-content p { font-size: 16px; color: #333; line-height: 1.8; margin-bottom: 1.25rem; }
        .post-content ul, .post-content ol { margin: 0.5rem 0 1.25rem 1.5rem; }
        .post-content li { font-size: 16px; color: #333; line-height: 1.7; margin-bottom: 0.35rem; }
        .post-content em { color: #777; font-style: italic; }
        .post-content strong { font-weight: 600; color: #1a1a1a; }
        .post-content blockquote {
            border-left: 3px solid #E8DDD2;
            margin: 1.5rem 0;
            padding: 0.5rem 0 0.5rem 1.25rem;
            color: #777;
            font-style: italic;
        }

        /* ── Recipe card: Editorial ── */
        .recipe-card {
            background: #C9B49A;
            border-radius: 6px;
            padding: 1.25rem 1.75rem;
            margin: 2rem 0;
            display: flex;
            gap: 0;
            flex-wrap: wrap;
        }
        .recipe-stat {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.4rem 2rem 0.4rem 0;
            margin-right: 2rem;
            border-right: 1px solid #B8A088;
        }
        .recipe-stat:last-child { border-right: none; margin-right: 0; }
        .recipe-stat .icon { font-size: 20px; line-height: 1; }
        .recipe-stat .label { font-size: 10px; color: #7A5C3E; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2px; }
        .recipe-stat .value { font-size: 14px; color: #3D2B1F; font-weight: 500; }

        /* ── Footer ── */
        footer {
            background: #C9B49A;
            padding: 2rem;
            margin-top: 5rem;
            border-top: 1px solid #B8A088;
            text-align: center;
            color: #1a1a1a;
            font-size: 13px;
            letter-spacing: 0.03em;
        }

        /* ── Tablet (≤768px) ── */
        @media (max-width: 768px) {
            header { padding: 1rem 1.25rem; }
            .header-inner { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
            nav a { margin-left: 0; margin-right: 1.25rem; }
            main { margin: 2rem auto; padding: 0 1.25rem; }
            .post-header h1 { font-size: 28px; }
            .post-content h2 { font-size: 22px; }
            .recipe-card { gap: 0; }
            .recipe-stat { padding: 0.5rem 1rem 0.5rem 0; margin-right: 1rem; }
        }

        /* ── Mobile (≤480px) ── */
        @media (max-width: 480px) {
            header { padding: 0.875rem 1rem; }
            nav a { font-size: 11px; margin-right: 1rem; }
            main { padding: 0 1rem; margin: 1.5rem auto; }
            .post-header h1 { font-size: 24px; }
            .post-header { margin-bottom: 1.5rem; padding-bottom: 1rem; }
            .post-content p, .post-content li { font-size: 15px; }
            .post-content h2 { font-size: 20px; margin: 1.75rem 0 0.75rem; }
            article.post-card h2 { font-size: 18px; }
            .recipe-card { flex-direction: row; flex-wrap: wrap; gap: 0; padding: 1rem; }
            .recipe-stat { width: 50%; border-right: none; margin-right: 0; padding: 0.5rem 0.5rem; border-bottom: 1px solid #B8A088; }
            .recipe-stat:nth-child(odd) { border-right: 1px solid #B8A088; }
            .recipe-stat:nth-last-child(-n+2) { border-bottom: none; }
            footer { padding: 1.5rem 1rem; }
            footer img { height: 100px; }
        }

        /* ── Images ── */
        .post-image { margin-bottom: 2rem; border-radius: 6px; overflow: hidden; }
        .post-image img { width: 100%; max-height: 420px; object-fit: cover; display: block; }
        .image-credit { font-size: 11px; color: #bbb; text-align: right; margin-top: 5px; font-style: italic; }

        /* Homepage card with thumbnail */
        .post-card.has-image { display: flex; gap: 1.5rem; align-items: flex-start; }
        .card-thumb { flex-shrink: 0; width: 190px; }
        .card-thumb img { width: 190px; height: 130px; object-fit: cover; border-radius: 4px; display: block; }
        .card-body { flex: 1; min-width: 0; }

        @media (max-width: 600px) {
            .post-card.has-image { flex-direction: column; }
            .card-thumb, .card-thumb img { width: 100%; height: 200px; }
        }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2CEB9PTEG2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2CEB9PTEG2');
    </script>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="/" class="header-logo">
                <span style="font-family: 'Playfair Display', Georgia, serif; font-size: 26px; color: #3D2B1F; letter-spacing: 0.04em;">SIR و SABZI</span>
            </a>
            <nav>
                {{ range .Site.Menus.main }}
                <a href="{{ .URL }}">{{ .Name }}</a>
                {{ end }}
            </nav>
        </div>
    </header>
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    <footer>
        <a href="/"><img src="/images/logo.png" alt="{{ .Site.Title }}" style="height: 140px; width: auto; margin-bottom: 1rem; display: block; margin-left: auto; margin-right: auto;"></a>
        <p>&copy; {{ now.Year }} &nbsp;·&nbsp; {{ .Site.Title }}</p>
    </footer>
</body>
</html>
