<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .Site.Title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; color: #333; }
        header { background: #f5f5f5; padding: 1.5rem 2rem; border-bottom: 1px solid #ddd; }
        .header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        .header-logo { display: flex; align-items: center; gap: 1rem; text-decoration: none; }
        .header-logo img { height: 120px; width: auto; }
        nav a { margin-left: 2rem; text-decoration: none; color: #0066cc; font-size: 0.95rem; }
        nav a:hover { text-decoration: underline; }
        main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .recipe { background: #f9f9f9; padding: 1.5rem; border-left: 4px solid #8B4513; margin: 1.5rem 0; border-radius: 4px; }
        footer { background: #f5f5f5; padding: 2rem; margin-top: 3rem; border-top: 1px solid #ddd; text-align: center; color: #666; }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="/" class="header-logo">
                <img src="/images/logo.png" alt="{{ .Site.Title }}">
            </a>
            <nav>
                {{ range .Site.Menus.main }}
                <a href="{{ .URL }}">{{ .Name }}</a>
                {{ end }}
            </nav>
        </div>
    </header>
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    <footer>
        <p>&copy; {{ now.Year }} {{ .Site.Params.author }}</p>
    </footer>
</body>
</html>
