<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .Site.Title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; color: #333; }
        header { background: #f5f5f5; padding: 2rem; border-bottom: 1px solid #ddd; }
        nav { max-width: 900px; margin: 0 auto; }
        nav a { margin-right: 2rem; text-decoration: none; color: #0066cc; }
        nav a:hover { text-decoration: underline; }
        main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .recipe { background: #f9f9f9; padding: 1.5rem; border-left: 4px solid #8B4513; margin: 1.5rem 0; }
        footer { background: #f5f5f5; padding: 2rem; margin-top: 3rem; border-top: 1px solid #ddd; text-align: center; color: #666; }
    </style>
</head>
<body>
    <header>
        <h1><a href="/" style="text-decoration: none; color: inherit;">{{ .Site.Title }}</a></h1>
        <nav>
            {{ range .Site.Menus.main }}
            <a href="{{ .URL }}">{{ .Name }}</a>
            {{ end }}
        </nav>
    </header>
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    <footer>
        <p>&copy; {{ now.Year }} {{ .Site.Params.author }}</p>
    </footer>
</body>
</html>
